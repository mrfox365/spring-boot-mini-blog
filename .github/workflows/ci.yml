name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DB_URL: jdbc:postgresql://localhost:5432/blog_db
      DB_USERNAME: postgres
      DB_PASSWORD: 09125689
      MAIL_USERNAME: dummy@example.com
      MAIL_PASSWORD: dummy_password

    # 1. ПІДНІМАЄМО POSTGRESQL ДЛЯ ТЕСТІВ
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 09125689
          POSTGRES_DB: blog_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Robot Framework
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-seleniumlibrary

      # 2. ЗАПУСК ДОДАТКУ З ПРОФІЛЕМ "ci" (щоб створився користувач Fox)
      - name: Start Spring Boot Application
        run: |
          nohup mvn spring-boot:run -Dspring-boot.run.profiles=ci &
          echo "Чекаємо на запуск сервера на порту 8080..."
          while ! nc -z localhost 8080; do
            sleep 2
          done
          echo "Сервер успішно запущено!"

      - name: Run JUnit, Selenide & Cucumber Tests
        run: mvn -B test

      - name: Run Robot Framework Tests
        run: python -m robot -v BROWSER:headlesschrome tests/robot_framework/blog_test.robot

      - name: Run CheckStyle
        run: mvn -B checkstyle:check

      - name: Run SpotBugs
        run: mvn -B com.github.spotbugs:spotbugs-maven-plugin:check

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: |
            target/cucumber-reports/
            build/reports/tests/
            output.xml
            log.html
            report.html