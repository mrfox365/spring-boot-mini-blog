<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IT Blog</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <a href="/index.html" class="logo">IT Blog</a>
    <div class="profile-container">
        <div class="avatar" id="headerAvatar">?</div>
        <div class="dropdown-menu" id="profileMenu">
            <div class="dropdown-item" id="openSettingsBtn">Profile Settings</div>
            <div class="dropdown-item logout-text" id="logoutBtn">Logout</div>
        </div>
    </div>
</header>

<div class="container">
    <div class="create-post-box">
        <h3>What's new?</h3>
        <textarea id="newPostContent" placeholder="Write your post here..."></textarea>
        <button class="btn" id="publishBtn">Publish</button>
    </div>

    <div id="feedContainer">
        <p class="empty-feed">Loading posts...</p>
    </div>
</div>

<div class="modal-overlay" id="viewProfileModal">
    <div class="modal-content">
        <button class="close-btn" id="closeViewProfileBtn">&times;</button>
        <h2 class="modal-title" id="viewUsername">Username</h2>
        <div class="modal-email"><span id="viewEmail">email@example.com</span></div>
        <div class="form-group">
            <label>Bio:</label>
            <p class="bio-box" id="viewBio">No information provided</p>
        </div>
        <div class="form-group">
            <label>Birth Date:</label>
            <p id="viewBirthDate">Not specified</p>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal-content">
        <button class="close-btn" id="closeSettingsBtn">&times;</button>
        <h2 class="modal-title">Profile Settings</h2>
        <div class="form-group"><label>New Username:</label><input type="text" id="editUsername"></div>
        <div class="form-group"><label>New Password (leave empty to keep current):</label><input type="password" id="editPassword" placeholder="Enter new password"></div>
        <div class="form-group"><label>Bio:</label><textarea id="editBio" rows="3"></textarea></div>
        <div class="form-group"><label>Birth Date:</label><input type="date" id="editBirthDate"></div>
        <div class="settings-btn-group">
            <button class="btn" id="saveProfileBtn">Save Changes</button>
            <button class="btn btn-secondary" id="cancelSettingsBtn">Cancel</button>
        </div>
    </div>
</div>

<script src="/js/index.js"></script>
</body>
</html>
