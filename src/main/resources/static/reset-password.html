<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Встановлення нового пароля</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">Новий пароль</h2>
    <input type="password" id="newPassword" placeholder="Введіть новий пароль">
    <input type="password" id="confirmPassword" placeholder="Підтвердіть пароль">
    <button onclick="resetPassword()">Зберегти пароль</button>
</div>

<script>
    async function resetPassword() {
        const pass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (pass !== confirm) {
            alert('Паролі не співпадають!');
            return;
        }

        // Дістаємо токен з URL (з того, що прийшов на пошту)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Помилка: відсутній токен безпеки у посиланні.');
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/auth/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: token, newPassword: pass})
            });
            const text = await response.text();

            if (response.ok) {
                alert('Пароль успішно змінено!');
                window.location.href = '/index.html'; // Повертаємо на головну
            } else {
                alert('Помилка: ' + text);
            }
        } catch (error) {
            alert('Помилка з\'єднання');
        }
    }
</script>

</body>
</html>
