<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - IT Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 320px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>New Password</h2>
    <input type="password" id="newPassword" placeholder="Enter new password">
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
    <button onclick="resetPassword()">Save Password</button>
</div>

<script>
    /**
     * Helper to retrieve the CSRF token from the XSRF-TOKEN cookie.
     */
    function getCsrfToken() {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; XSRF-TOKEN=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    async function resetPassword() {
        const pass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!pass.trim()) {
            alert('Password cannot be empty!');
            return;
        }

        if (pass !== confirm) {
            alert('Passwords do not match!');
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Error: Security token is missing from the link.');
            return;
        }

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-XSRF-TOKEN': getCsrfToken()
                },
                body: JSON.stringify({token: token, newPassword: pass})
            });

            if (response.ok) {
                alert('Password has been changed successfully!');
                window.location.href = '/auth.html';
            } else {
                alert('Error: ' + await response.text());
            }
        } catch (error) {
            alert('Connection error');
        }
    }
</script>
</body>
</html>
